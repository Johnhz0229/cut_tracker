<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin — Cut Tracker</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:       #0a0a0a;
    --surface:  #141414;
    --surface2: #1e1e1e;
    --border:   #2a2a2a;
    --text:     #f0f0f0;
    --muted:    #666;
    --green:    #4ade80;
    --red:      #f87171;
    --yellow:   #fbbf24;
    --blue:     #60a5fa;
    --sp:       8px;
  }

  html, body {
    min-height: 100%; background: var(--bg); color: var(--text);
    font-family: system-ui, -apple-system, sans-serif; font-size: 15px; line-height: 1.5;
  }

  .page { max-width: 560px; margin: 0 auto; padding: calc(var(--sp)*4) calc(var(--sp)*2); }

  h1 { font-size: 18px; font-weight: 700; color: var(--muted); letter-spacing: 0.05em;
       text-transform: uppercase; margin-bottom: calc(var(--sp)*4); }

  h2 { font-size: 13px; font-weight: 700; text-transform: uppercase;
       letter-spacing: 0.06em; color: var(--muted); margin-bottom: calc(var(--sp)*2); }

  label { display: block; font-size: 13px; color: var(--muted); margin-bottom: 4px; }

  input {
    width: 100%; background: var(--surface2); border: 1px solid var(--border);
    border-radius: 6px; color: var(--text); font-size: 15px; font-family: inherit;
    padding: calc(var(--sp)*1.25) calc(var(--sp)*1.5); outline: none;
  }
  input:focus { border-color: var(--blue); }

  .field { margin-bottom: calc(var(--sp)*2); }

  .btn {
    padding: calc(var(--sp)*1.25) calc(var(--sp)*2.5); border-radius: 7px; border: none;
    font-size: 14px; font-weight: 600; cursor: pointer; transition: opacity 0.15s;
  }
  .btn:disabled { opacity: 0.4; cursor: not-allowed; }
  .btn-primary { background: var(--green); color: #000; }
  .btn-danger  { background: none; border: 1px solid var(--border); color: var(--red);
                 font-size: 12px; padding: 4px 12px; border-radius: 5px; cursor: pointer; }
  .btn-danger:hover { border-color: var(--red); }

  .msg { font-size: 13px; margin-top: 8px; }
  .msg.ok  { color: var(--green); }
  .msg.err { color: var(--red); }

  .section { display: none; }
  .section.visible { display: block; }

  .divider { border: none; border-top: 1px solid var(--border); margin: calc(var(--sp)*4) 0; }

  /* inline create-user row */
  .create-row { display: flex; gap: var(--sp); align-items: flex-end; flex-wrap: wrap; }
  .create-row .field { flex: 1; min-width: 140px; margin-bottom: 0; }

  /* user list */
  .user-list { margin-top: calc(var(--sp)*2); display: flex; flex-direction: column; gap: var(--sp); }
  .user-row {
    display: flex; align-items: center; gap: calc(var(--sp)*1.5);
    background: var(--surface); border: 1px solid var(--border); border-radius: 8px;
    padding: calc(var(--sp)*1.5) calc(var(--sp)*2);
  }
  .user-name  { font-weight: 600; flex: 1; }
  .user-meta  { font-size: 12px; color: var(--muted); }
  .user-count { font-size: 12px; color: var(--blue); min-width: 60px; text-align: right; }

  .confirm-row { display: flex; gap: var(--sp); align-items: center;
                 font-size: 12px; color: var(--red); margin-top: 8px; }
  .confirm-row button { font-size: 12px; padding: 3px 10px; border-radius: 4px; cursor: pointer;
                        border: 1px solid var(--border); background: var(--surface2); color: var(--text); }
  .confirm-row .yes { background: var(--red); color: #000; border-color: var(--red); }
</style>
</head>
<body>
<div class="page">
  <h1>Cut Tracker — Admin</h1>

  <!-- ── Section 1: Unlock ── -->
  <div id="section-unlock" class="section visible">
    <div class="field" style="max-width:320px">
      <label>Admin secret</label>
      <input type="password" id="secret-input" placeholder="Enter ADMIN_SECRET"
             onkeydown="if(event.key==='Enter')unlock()">
    </div>
    <button class="btn btn-primary" onclick="unlock()">Unlock</button>
    <div class="msg err" id="unlock-error" style="display:none">Invalid secret.</div>
  </div>

  <!-- ── Section 2: Manage Users ── -->
  <div id="section-manage" class="section">

    <h2>Create user</h2>
    <div class="create-row">
      <div class="field"><label>Username</label><input type="text" id="new-username" autocomplete="off"></div>
      <div class="field"><label>Password</label><input type="password" id="new-password" autocomplete="new-password"></div>
      <button class="btn btn-primary" onclick="createUser()" style="margin-bottom:0;flex-shrink:0">Create</button>
    </div>
    <div class="msg" id="create-msg" style="display:none"></div>

    <hr class="divider">

    <h2>Users <span id="user-count-label" style="font-weight:400;color:var(--muted)"></span></h2>
    <div class="user-list" id="user-list">
      <span style="color:var(--muted);font-size:13px">Loading…</span>
    </div>
  </div>
</div>

<script>
let adminSecret = '';

// ── Unlock ────────────────────────────────────────────────────────────────────
async function unlock() {
  const secret = document.getElementById('secret-input').value;
  const errEl  = document.getElementById('unlock-error');
  errEl.style.display = 'none';

  const res = await post('/api/admin/verify', { admin_secret: secret });
  if (!res.success) { errEl.style.display = 'block'; return; }

  adminSecret = secret;
  sessionStorage.setItem('adminSecret', secret);

  document.getElementById('section-unlock').classList.remove('visible');
  document.getElementById('section-manage').classList.add('visible');
  loadUsers();
}

// ── Create user ───────────────────────────────────────────────────────────────
async function createUser() {
  const username = document.getElementById('new-username').value.trim();
  const password = document.getElementById('new-password').value;
  const msgEl    = document.getElementById('create-msg');

  msgEl.style.display = 'none';
  if (!username || !password) { showMsg(msgEl, 'err', 'Fill in both fields.'); return; }

  const res = await post('/api/admin/create-user', {
    username, password, admin_secret: adminSecret,
  });

  if (res.success) {
    showMsg(msgEl, 'ok', `Created: ${res.data.username}`);
    document.getElementById('new-username').value = '';
    document.getElementById('new-password').value = '';
    loadUsers();
  } else {
    showMsg(msgEl, 'err', res.error || 'Failed.');
  }
}

// ── User list ─────────────────────────────────────────────────────────────────
async function loadUsers() {
  const res = await get('/api/admin/users');
  const list = document.getElementById('user-list');

  if (!res.success) {
    list.innerHTML = `<span style="color:var(--red);font-size:13px">${res.error}</span>`;
    return;
  }

  const users = res.data;
  document.getElementById('user-count-label').textContent =
    `(${users.length} total)`;

  if (!users.length) {
    list.innerHTML = '<span style="color:var(--muted);font-size:13px">No users yet.</span>';
    return;
  }

  list.innerHTML = users.map(u => `
    <div class="user-row" id="user-row-${CSS.escape(u.username)}">
      <span class="user-name">${esc(u.username)}</span>
      <span class="user-meta">${fmtDate(u.created_at)}</span>
      <span class="user-count">${u.record_count} records</span>
      <button class="btn-danger" onclick="promptDelete('${esc(u.username)}')">Delete</button>
    </div>
    <div class="confirm-row" id="confirm-${CSS.escape(u.username)}" style="display:none">
      Delete <strong>${esc(u.username)}</strong> and all their data?
      <button class="yes" onclick="confirmDelete('${esc(u.username)}')">Yes, delete</button>
      <button onclick="cancelDelete('${esc(u.username)}')">Cancel</button>
    </div>
  `).join('');
}

function promptDelete(username) {
  document.getElementById(`confirm-${CSS.escape(username)}`).style.display = 'flex';
  document.getElementById(`user-row-${CSS.escape(username)}`).querySelector('.btn-danger').style.display = 'none';
}

function cancelDelete(username) {
  document.getElementById(`confirm-${CSS.escape(username)}`).style.display = 'none';
  document.getElementById(`user-row-${CSS.escape(username)}`).querySelector('.btn-danger').style.display = '';
}

async function confirmDelete(username) {
  const res = await del(`/api/admin/users/${encodeURIComponent(username)}`);
  if (res.success) {
    loadUsers();
  } else {
    alert(res.error || 'Delete failed.');
  }
}

// ── API helpers ───────────────────────────────────────────────────────────────
async function post(path, body) {
  try {
    const r = await fetch(path, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body),
    });
    const j = await r.json();
    if (!r.ok) return { success: false, error: j.detail?.error || 'Request failed' };
    return j;
  } catch { return { success: false, error: 'Network error.' }; }
}

async function get(path) {
  try {
    const r = await fetch(path, {
      headers: { 'X-Admin-Secret': adminSecret },
    });
    const j = await r.json();
    if (!r.ok) return { success: false, error: j.detail?.error || 'Request failed' };
    return j;
  } catch { return { success: false, error: 'Network error.' }; }
}

async function del(path) {
  try {
    const r = await fetch(path, {
      method: 'DELETE',
      headers: { 'X-Admin-Secret': adminSecret },
    });
    const j = await r.json();
    if (!r.ok) return { success: false, error: j.detail?.error || 'Request failed' };
    return j;
  } catch { return { success: false, error: 'Network error.' }; }
}

// ── Helpers ───────────────────────────────────────────────────────────────────
function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function fmtDate(iso) {
  if (!iso) return '';
  const d = new Date(iso);
  return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
}

function showMsg(el, type, text) {
  el.className = `msg ${type}`;
  el.textContent = text;
  el.style.display = 'block';
}

// ── Auto-restore session ──────────────────────────────────────────────────────
(function () {
  const saved = sessionStorage.getItem('adminSecret');
  if (saved) {
    document.getElementById('secret-input').value = saved;
    unlock();
  }
})();
</script>
</body>
</html>
